<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | StellarComics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <a href="index.html">StellarComics</a>
        </div>
        <div class="nav-actions">
            <button class="btn-icon" id="theme-toggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <header class="profile-header">
        <img src="" alt="Avatar" class="profile-avatar skeleton" id="prof-pic">
        <div class="profile-info">
            <h1 id="prof-name" class="skeleton" style="min-width: 200px; min-height: 40px; border-radius: 4px;"></h1>
            <p style="color: var(--text-muted);">Joined January 2023</p>
        </div>
    </header>

    <nav class="profile-tabs">
        <div class="tab active" data-target="library">My Library</div>
        <div class="tab" data-target="history">Reading History</div>
    </nav>

    <main class="profile-grid" id="profile-grid">
         <!-- Skeleton Loading -->
         <div class="comic-card skeleton" style="height: 310px;"></div>
         <div class="comic-card skeleton" style="height: 310px;"></div>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
