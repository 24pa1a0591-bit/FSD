<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reader | StellarComics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark-mode" style="background-color: #000;">

    <!-- Reader Header -->
    <header class="reader-header" id="reader-header">
        <a href="comic.html" id="back-btn" style="font-size: 1.5rem;"><i class="fas fa-arrow-left"></i></a>
        <h3 id="reader-title" style="margin: 0; font-weight: 500; font-size: 1.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%;">Episode Title</h3>
        <button class="btn-icon" style="color: #fff;"><i class="fas fa-bars"></i></button>
    </header>

    <!-- Reading Content (Vertical Scroll) -->
    <main class="reader-content" id="reader-container">
        <!-- Skeleton Loaders -->
        <div class="skeleton" style="width: 100%; max-width: 800px; height: 100vh; margin-bottom: 10px;"></div>
    </main>

    <footer class="reader-footer">
        <h3>End of Episode</h3>
        <p style="color: var(--text-muted); margin: 1rem 0;">Liked it? Give it a heart!</p>
        <button class="btn-icon" onclick="this.style.color='#ff3b3b'" style="color: #fff; font-size: 2rem; margin: 0 auto;"><i class="fas fa-heart"></i></button>
        <div style="margin-top: 2rem;">
            <a href="#" class="btn-primary" style="background-color: #333; color: #fff;">Next Episode <i class="fas fa-arrow-right"></i></a>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
