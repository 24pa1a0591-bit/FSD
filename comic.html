<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Details | StellarComics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <a href="index.html">StellarComics</a>
        </div>
        <div class="nav-actions">
            <button class="btn-icon" id="theme-toggle">
                <i class="fas fa-moon"></i>
            </button>
            <a href="profile.html">
                <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile" class="profile-pic">
            </a>
        </div>
    </nav>

    <!-- Comic Header Info -->
    <header class="comic-header">
        <img src="" alt="Cover" class="comic-cover skeleton" id="comic-cover">
        <div class="comic-header-content">
            <img src="" alt="Thumbnail" class="comic-header-thumb skeleton" id="comic-thumb">
            <div class="comic-meta">
                <h1 id="comic-title" class="skeleton" style="min-width: 200px; min-height: 48px; border-radius: 4px; display: inline-block;"></h1>
                <div class="author skeleton" id="comic-author" style="min-width: 150px; min-height: 24px; border-radius: 4px;"></div>
                <div class="tags" id="comic-tags">
                    <!-- Dynamic tags -->
                </div>
                <div class="action-buttons">
                    <button class="btn-primary" onclick="alert('Subscribed!')"><i class="fas fa-plus"></i> Subscribe</button>
                    <button class="btn-icon" style="background: rgba(255,255,255,0.2);"><i class="fas fa-share-alt"></i></button>
                </div>
            </div>
        </div>
    </header>

    <!-- Comic Body (Desc + Episodes) -->
    <main class="comic-body">
        <div class="main-column">
            <h3 style="margin-bottom: 1rem;">About</h3>
            <p class="comic-desc skeleton" id="comic-desc" style="min-height: 100px; border-radius: 4px;"></p>

            <h3 style="margin: 2rem 0 1rem; display:flex; justify-content:space-between;">
                Episodes <span style="font-size: 0.9rem; font-weight: normal; color: var(--text-muted); cursor: pointer;"><i class="fas fa-sort-amount-down"></i> Sort</span>
            </h3>
            <div class="episode-list" id="episode-list">
                <!-- Skeleton Loading -->
                <div class="episode-item skeleton" style="height: 60px;"></div>
                <div class="episode-item skeleton" style="height: 60px;"></div>
                <div class="episode-item skeleton" style="height: 60px;"></div>
            </div>
        </div>
        
        <aside class="sidebar-column">
            <div style="background: var(--bg-card); padding: 1.5rem; border-radius: var(--radius);">
                <h4 style="margin-bottom: 1rem;">Creator Note</h4>
                <p style="font-size: 0.9rem; color: var(--text-muted);">Thank you for all the love and support! New episodes every Sunday.</p>
                <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
                    <button class="btn-icon"><i class="fab fa-twitter"></i></button>
                    <button class="btn-icon"><i class="fab fa-instagram"></i></button>
                </div>
            </div>
        </aside>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
